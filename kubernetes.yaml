apiVersion: v1
kind: Namespace
metadata:
  name: alex-ai

---
apiVersion: v1
kind: Secret
metadata:
  name: alex-ai-secrets
  namespace: alex-ai
type: Opaque
stringData:
  # Replace with your real keys
  GEMINI_API_KEY: "PASTE_YOUR_GEMINI_API_KEY_HERE"
  APP_URL: "https://your-domain.edu"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alex-ai-deployment
  namespace: alex-ai
  labels:
    app: alex-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: alex-ai
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: alex-ai
    spec:
      containers:
      - name: alex-ai-container
        image: your-registry/alex-ai:latest # Replace with your built Docker image tag
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: alex-ai-secrets
              key: GEMINI_API_KEY
        - name: APP_URL
          valueFrom:
            secretKeyRef:
              name: alex-ai-secrets
              key: APP_URL
        resources:
          limits:
            cpu: "1000m"
            memory: "1Gi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /api/admin/metrics
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/admin/metrics
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: alex-ai-service
  namespace: alex-ai
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: alex-ai

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alex-ai-ingress
  namespace: alex-ai
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - your-domain.edu
    secretName: alex-ai-tls-secret
  rules:
  - host: your-domain.edu
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: alex-ai-service
            port:
              number: 80
