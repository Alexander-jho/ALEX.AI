version: '3.8'

services:
  alex_ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alex-ai-platform
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_URL=${APP_URL:-http://localhost:3000}
    restart: always
